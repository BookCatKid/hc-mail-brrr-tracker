name: Mail Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install node-fetch

      # 🧠 Restore cached state
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: mail-state

      - name: Run script
        env:
          MAIL_TOKEN: ${{ secrets.MAIL_TOKEN }}
          BRRR_WEBHOOK: ${{ secrets.BRRR_WEBHOOK }}
        run: node index.js

      # 💾 Save updated state back to cache
      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: mail-state
