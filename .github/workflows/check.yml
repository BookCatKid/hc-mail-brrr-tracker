name: Mail Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: mail-notifier
  cancel-in-progress: true

jobs:
  run-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install deps
      - name: Install dependencies
        run: npm install node-fetch

      # 4. Restore latest state (prefix match)
      - name: Restore state cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: mail-state-latest
          restore-keys: |
            mail-state-

      # 5. Ensure file exists (important)
      - name: Initialize state if missing
        run: |
          if [ ! -f state.json ]; then
            echo "{}" > state.json
          fi

      # 6. Run notifier script
      - name: Run mail checker
        env:
          MAIL_TOKEN: ${{ secrets.MAIL_TOKEN }}
          BRRR_WEBHOOK: ${{ secrets.BRRR_WEBHOOK }}
        run: node index.js

      # 7. Save updated state (NEW key every run)
      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: mail-state-${{ github.run_id }}
